<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PagerCraft — Presentation Example</title>
<style>
:root{
  --ivory:#FAF9F5;--paper:#FFFFFF;--paper-warm:#F7F4EC;--paper-deep:#F3EEE4;
  --ink:#171716;--muted:#706F68;--faint:#A09E96;--line:#D8D1C3;--line-strong:#C8BBA8;--line-faint:#EAE5DA;
  --clay:#C86645;--clay-dark:#A84D32;--clay-soft:#FBEDE6;--clay-border:#E8B49E;
  --olive:#74845B;--olive-dark:#56663E;--olive-soft:#EDF1E7;--olive-border:#B8C9A3;
  --amber:#B87A1A;--amber-soft:#FBF1DF;--blue:#2D6BB0;--blue-soft:#E8F0FB;
  --font-serif:ui-serif,Georgia,"Times New Roman",serif;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --radius-sm:6px;--radius-md:8px;--radius-lg:10px;--shadow-sm:0 2px 6px rgba(23,23,22,.08);--shadow-md:0 6px 24px rgba(23,23,22,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--ivory);color:var(--ink);font-family:var(--font-sans);font-size:15px}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}
.app{display:grid;grid-template-columns:250px 1fr 280px;min-height:100vh}
.rail,.notes{background:rgba(255,255,255,.68);border-color:var(--line);border-style:solid}
.rail{border-width:0 1px 0 0;padding:20px;overflow:auto}
.notes{border-width:0 0 0 1px;padding:20px;display:flex;flex-direction:column;gap:16px}
.brand{font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:4px}.brand span{color:var(--clay)}
.sub{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:18px}
.lang-toggle,.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lang-toggle{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-md);padding:3px;margin-bottom:18px}
.lang-btn,.btn{border:1px solid var(--line);background:var(--paper);border-radius:var(--radius-md);font-size:13px;height:32px;padding:0 10px}
.lang-btn.active,.btn.primary{background:var(--clay-soft);border-color:var(--clay-border);color:var(--clay-dark);font-weight:700}
.thumbs{display:flex;flex-direction:column;gap:10px}
.thumb{width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:10px;transition:.2s}
.thumb:hover{border-color:var(--line-strong);background:var(--paper-warm)}
.thumb.active{border-color:var(--clay-border);box-shadow:inset 3px 0 0 var(--clay)}
.thumb-no{font-family:var(--font-mono);font-size:11px;color:var(--faint);margin-bottom:5px}.thumb-title{font-size:13px;font-weight:700;line-height:1.35}
.stage-wrap{display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:rgba(250,249,245,.82);backdrop-filter:blur(10px)}
.progress{height:5px;background:var(--paper-deep)}.progress-fill{height:100%;background:var(--clay);width:0;transition:width .2s}
.stage{flex:1;display:grid;place-items:center;padding:28px}
.slide{width:min(100%,1060px);aspect-ratio:16/9;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-md);padding:54px 62px;display:none;overflow:hidden;position:relative}
.slide.active{display:flex;flex-direction:column}
.slide:after{content:"";position:absolute;left:62px;right:62px;bottom:34px;height:1px;background:var(--line-faint)}
.eyebrow{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--clay-dark);margin-bottom:18px}
.h1{font-family:var(--font-serif);font-size:56px;line-height:1.04;letter-spacing:0;margin-bottom:18px}
.lead{font-size:20px;color:var(--muted);line-height:1.55;max-width:720px}
.title-slide{justify-content:center}.title-slide .lead{max-width:780px}.meta-row{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--paper-warm);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--muted)}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:20px}
.point{border-top:1px solid var(--line);padding-top:16px}.point b{display:block;font-family:var(--font-serif);font-size:23px;margin-bottom:8px}.point p{color:var(--muted);line-height:1.55}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}.metric{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px}
.metric-value{font-family:var(--font-serif);font-size:42px;line-height:1;color:var(--ink)}.metric-label{font-size:12px;color:var(--muted);margin-top:8px}
.bars{display:flex;align-items:end;gap:14px;height:210px;margin-top:20px;padding:18px;border:1px solid var(--line);border-radius:var(--radius-lg);background:linear-gradient(var(--paper-warm),var(--paper))}
.bar{flex:1;border-radius:6px 6px 0 0;background:var(--clay);min-height:30px;position:relative}.bar.secondary{background:var(--olive)}.bar span{position:absolute;left:0;right:0;bottom:-28px;text-align:center;font-size:12px;color:var(--muted)}
.quote{margin:auto;max-width:820px;font-family:var(--font-serif);font-size:42px;line-height:1.18}.quote-mark{font-size:76px;color:var(--clay);line-height:.8}.quote-by{font-family:var(--font-sans);font-size:15px;color:var(--muted);margin-top:24px}
.timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:38px;border-top:2px solid var(--line-strong)}
.milestone{padding:18px 16px 0;border-left:1px solid var(--line)}.milestone:first-child{border-left:0}.milestone strong{font-family:var(--font-serif);font-size:20px}.milestone p{font-size:13px;color:var(--muted);line-height:1.45;margin-top:8px}
.note-title{font-family:var(--font-serif);font-size:19px;font-weight:700}.note-body{font-size:14px;color:var(--muted);line-height:1.65;white-space:pre-line}
.component-card{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper);padding:14px}.component-card h3{font-size:13px;margin-bottom:8px}.component-list{font-size:12px;color:var(--muted);line-height:1.7;padding-left:18px}
.footer-controls{display:flex;gap:8px;margin-top:auto}.count{font-family:var(--font-mono);font-size:12px;color:var(--muted)}
.fullscreen .app{grid-template-columns:1fr}.fullscreen .rail,.fullscreen .notes,.fullscreen .topbar{display:none}.fullscreen .stage{min-height:100vh}.fullscreen .slide{width:min(96vw,1280px)}
@media(max-width:980px){.app{grid-template-columns:1fr}.rail,.notes{border:0}.rail{max-height:240px}.notes{display:none}.thumbs{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));overflow:auto}.stage{padding:14px}.slide{padding:30px 24px;border-radius:10px}.h1{font-size:38px}.lead{font-size:16px}.content-grid,.metric-grid,.timeline{grid-template-columns:1fr}.bars{height:170px}.quote{font-size:30px}.slide:after{left:24px;right:24px}}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand">Pager<span>Craft</span></div>
    <div class="sub" data-t="deck_sub">PPT / HTML deck example with paper-style slide components.</div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <div class="thumbs" id="thumbs"></div>
  </aside>
  <section class="stage-wrap">
    <header class="topbar">
      <div><strong id="top-title"></strong> <span class="count" id="top-count"></span></div>
      <div class="toolbar">
        <button class="btn" onclick="prevSlide()" data-t="prev">上一页</button>
        <button class="btn primary" onclick="nextSlide()" data-t="next">下一页</button>
        <button class="btn" onclick="toggleFullscreen()" data-t="full">演示</button>
      </div>
    </header>
    <div class="progress"><div class="progress-fill" id="progress"></div></div>
    <main class="stage" id="stage"></main>
  </section>
  <aside class="notes">
    <div class="component-card">
      <div class="note-title" data-t="speaker_notes">演讲备注</div>
      <div class="note-body" id="note-body"></div>
    </div>
    <div class="component-card">
      <h3 data-t="ppt_components">PPT 组件</h3>
      <ul class="component-list">
        <li data-t="comp_1">标题页 / 章节页</li>
        <li data-t="comp_2">双栏内容页</li>
        <li data-t="comp_3">指标卡 + 图表页</li>
        <li data-t="comp_4">引用页 / 结论页</li>
        <li data-t="comp_5">时间线 / 路线图页</li>
      </ul>
    </div>
    <div class="footer-controls">
      <button class="btn" onclick="prevSlide()" data-t="prev_short">上页</button>
      <button class="btn primary" onclick="nextSlide()" data-t="next_short">下页</button>
    </div>
  </aside>
</div>
<script>
const COPY={
 zh:{
  deck_sub:'PPT / HTML 演示范例：纸感幻灯片组件与演讲模式。',prev:'上一页',next:'下一页',full:'演示',prev_short:'上页',next_short:'下页',speaker_notes:'演讲备注',ppt_components:'PPT 组件',
  comp_1:'标题页 / 章节页',comp_2:'双栏内容页',comp_3:'指标卡 + 图表页',comp_4:'引用页 / 结论页',comp_5:'时间线 / 路线图页',
  slides:[
   {type:'title',k:'Strategy Deck',title:'把复杂策略讲成一页纸',lead:'PagerCraft 用 Claude paper 视觉语言组织 PPT：信息密度够高，阅读节奏稳定，适合汇报、路演、复盘和课程讲解。',meta:['16:9','中英双语','键盘导航'],note:'开场只讲一个核心判断：这套视觉语言不是装饰，而是让内容更容易被读懂。'},
   {type:'two',k:'Narrative',title:'先给结论，再给证据',lead:'每一页都围绕一个明确句子，而不是把所有材料堆进版面。',points:[['结论区','用 serif 标题承载判断，避免营销式大字压过内容。'],['证据区','用表格、指标、图表和注释支撑判断。'],['节奏区','每页只承担一个动作：解释、比较、证明或推进。'],['操作区','保留演讲备注、页码、导出或全屏等真实工作流。']],note:'这里强调结构：标题不是标题党，而是这页要交付的判断。'},
   {type:'data',k:'Evidence',title:'数据页保持安静，但不单调',lead:'用 clay 表示主线，用 olive 表示健康或完成，用细边框建立阅读秩序。',metrics:[['38%','推荐渠道占比'],['-22%','获客成本下降'],['4.6x','复购贡献提升']],bars:[62,84,48,76],note:'数据页不要做成深色控制台。浅色纸面也能承载严肃数据。'},
   {type:'quote',k:'Principle',quote:'好的 PPT 不是把 Markdown 变大，而是把判断、证据和节奏重新排版。',by:'PagerCraft presentation principle',note:'引用页用于停顿，让听众记住一句话。'},
   {type:'timeline',k:'Roadmap',title:'从材料到演示的四步',lead:'适合产品 PRD、项目复盘、课程讲义和商业计划书。',steps:[['整理','抽取核心判断和证据。'],['编排','选择标题、双栏、数据、引用或路线图组件。'],['打磨','统一配色、字号、留白和页脚。'],['演示','补充备注，检查键盘和全屏模式。']],note:'时间线页用来讲路径，避免在一个流程图里塞太多箭头。'}
  ]},
 en:{
  deck_sub:'PPT / HTML deck example with paper-style slide components.',prev:'Previous',next:'Next',full:'Present',prev_short:'Prev',next_short:'Next',speaker_notes:'Speaker Notes',ppt_components:'PPT Components',
  comp_1:'Title / section slide',comp_2:'Two-column content slide',comp_3:'Metric cards + chart slide',comp_4:'Quote / conclusion slide',comp_5:'Timeline / roadmap slide',
  slides:[
   {type:'title',k:'Strategy Deck',title:'Turn complex strategy into a readable deck',lead:'PagerCraft applies the Claude paper language to slide design: calm density, clear hierarchy, and useful controls for briefings, reviews, lectures, and pitches.',meta:['16:9','Bilingual','Keyboard nav'],note:'Open with one point: the visual system is not decoration; it makes the argument easier to inspect.'},
   {type:'two',k:'Narrative',title:'Conclusion first, evidence second',lead:'Every slide should carry one sentence of meaning rather than a pile of material.',points:[['Conclusion','Use serif titles for judgment, not marketing volume.'],['Evidence','Support with metrics, tables, charts, and annotations.'],['Rhythm','Each slide explains, compares, proves, or advances.'],['Workflow','Keep notes, pagination, export, or fullscreen controls real.']],note:'Emphasize structure: the title is the claim this slide needs to deliver.'},
   {type:'data',k:'Evidence',title:'Data slides can stay quiet without going flat',lead:'Clay carries the primary story, olive marks health or completion, and fine borders create reading order.',metrics:[['38%','Referral share'],['-22%','CAC reduction'],['4.6x','Repeat contribution']],bars:[62,84,48,76],note:'A serious data slide does not have to look like a dark console.'},
   {type:'quote',k:'Principle',quote:'A good deck does not enlarge Markdown; it re-composes judgment, evidence, and rhythm.',by:'PagerCraft presentation principle',note:'Use quote slides as pauses that let one sentence stick.'},
   {type:'timeline',k:'Roadmap',title:'Four steps from material to presentation',lead:'Useful for PRDs, project reviews, courseware, and business plans.',steps:[['Collect','Extract the main claim and evidence.'],['Compose','Choose title, two-column, data, quote, or roadmap components.'],['Polish','Unify palette, type, spacing, and footer.'],['Present','Add notes, test keyboard navigation and fullscreen.']],note:'Roadmaps explain motion without stuffing every arrow into one diagram.'}
  ]}
};
let LANG='zh', index=0;
function t(k){return COPY[LANG][k]||k}
function render(){
 const slides=COPY[LANG].slides;
 document.querySelectorAll('[data-t]').forEach(el=>el.textContent=t(el.dataset.t));
 document.getElementById('thumbs').innerHTML=slides.map((s,i)=>`<button class="thumb ${i===index?'active':''}" onclick="go(${i})"><div class="thumb-no">${String(i+1).padStart(2,'0')} · ${s.k}</div><div class="thumb-title">${s.title||s.quote}</div></button>`).join('');
 document.getElementById('stage').innerHTML=slides.map((s,i)=>slideHtml(s,i)).join('');
 document.querySelectorAll('.slide')[index].classList.add('active');
 document.getElementById('top-title').textContent=slides[index].k;
 document.getElementById('top-count').textContent=`${index+1}/${slides.length}`;
 document.getElementById('progress').style.width=((index+1)/slides.length*100)+'%';
 document.getElementById('note-body').textContent=slides[index].note;
 document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG));
}
function slideHtml(s,i){
 if(s.type==='title')return `<article class="slide title-slide"><div class="eyebrow">${s.k}</div><h1 class="h1">${s.title}</h1><p class="lead">${s.lead}</p><div class="meta-row">${s.meta.map(m=>`<span class="pill">${m}</span>`).join('')}</div></article>`;
 if(s.type==='two')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h1" style="font-size:42px">${s.title}</h2><p class="lead">${s.lead}</p><div class="content-grid">${s.points.map(p=>`<div class="point"><b>${p[0]}</b><p>${p[1]}</p></div>`).join('')}</div></article>`;
 if(s.type==='data')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h1" style="font-size:40px">${s.title}</h2><p class="lead">${s.lead}</p><div class="metric-grid">${s.metrics.map(m=>`<div class="metric"><div class="metric-value">${m[0]}</div><div class="metric-label">${m[1]}</div></div>`).join('')}</div><div class="bars">${s.bars.map((b,i)=>`<div class="bar ${i%2?'secondary':''}" style="height:${b}%"><span>Q${i+1}</span></div>`).join('')}</div></article>`;
 if(s.type==='quote')return `<article class="slide"><div class="quote"><div class="quote-mark">“</div>${s.quote}<div class="quote-by">${s.by}</div></div></article>`;
 return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h1" style="font-size:40px">${s.title}</h2><p class="lead">${s.lead}</p><div class="timeline">${s.steps.map(p=>`<div class="milestone"><strong>${p[0]}</strong><p>${p[1]}</p></div>`).join('')}</div></article>`;
}
function setLang(l){LANG=l;render()}
function go(i){index=i;render()}
function nextSlide(){index=Math.min(COPY[LANG].slides.length-1,index+1);render()}
function prevSlide(){index=Math.max(0,index-1);render()}
function toggleFullscreen(){document.body.classList.toggle('fullscreen')}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')nextSlide();if(e.key==='ArrowLeft')prevSlide();if(e.key==='Escape')document.body.classList.remove('fullscreen')});
render();
</script>
</body>
</html>
