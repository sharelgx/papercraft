<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PagerCraft — Presentation Example</title>
<style>
:root{
  --ivory:#FAF9F5;--paper:#FFFFFF;--paper-warm:#F7F4EC;--paper-deep:#F3EEE4;

  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;

  --ease-out:cubic-bezier(.16,1,.3,1);--ease-in-out:cubic-bezier(.65,0,.35,1);--dur-fast:160ms;--dur-base:260ms;--dur-slow:520ms;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--ivory);color:var(--ink);font-family:var(--font-sans);font-size:15px}

.app{height:100vh;display:grid;grid-template-columns:clamp(200px,18vw,250px) minmax(0,1fr) clamp(220px,20vw,280px);overflow:hidden}
.rail,.notes{min-height:0;background:rgba(255,255,255,.68);border-color:var(--line);border-style:solid}
.rail{border-width:0 1px 0 0;padding:18px;overflow:auto}

.lang-toggle,.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lang-toggle{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-md);padding:3px;margin-bottom:16px}
.lang-btn,.btn{border:1px solid var(--line);background:var(--paper);border-radius:var(--radius-md);font-size:13px;height:32px;padding:0 10px}
.lang-btn.active,.btn.primary{background:var(--clay-soft);border-color:var(--clay-border);color:var(--clay-dark);font-weight:700}
.thumbs{display:flex;flex-direction:column;gap:9px}
.thumb{width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:10px;transition:background var(--dur-base),border-color var(--dur-base),box-shadow var(--dur-base),transform var(--dur-base) var(--ease-out)}
.thumb:hover{border-color:var(--line-strong);background:var(--paper-warm);transform:translateX(2px)}

.thumb-no{font-family:var(--font-mono);font-size:11px;color:var(--faint);margin-bottom:5px}.thumb-title{font-size:12px;font-weight:700;line-height:1.35}
.stage-wrap{min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}

.slide.active{display:flex;flex-direction:column}

.quote{margin:auto;max-width:820px;font-family:var(--font-serif);font-size:clamp(30px,3.4vw,42px);line-height:1.18}.quote-mark{font-size:64px;color:var(--clay);line-height:.8}.quote-by{font-family:var(--font-sans);font-size:14px;color:var(--muted);margin-top:20px}

.media-layout,.code-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:24px;align-items:stretch;margin-top:14px;min-height:0;flex:1}
.media-frame{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper-warm);padding:16px;display:flex;flex-direction:column;gap:12px;min-height:0}
.media-window{flex:1;min-height:120px;border:1px solid var(--line);border-radius:var(--radius-md);background:linear-gradient(135deg,var(--paper) 0%,var(--paper-deep) 100%);position:relative;overflow:hidden}
.media-window:before{content:"";position:absolute;left:28px;right:28px;top:32px;height:46%;border-radius:10px;background:var(--clay-soft);border:1px solid var(--clay-border)}
.media-window:after{content:"";position:absolute;left:54px;right:70px;bottom:34px;height:20%;border-radius:10px;background:var(--olive-soft);border:1px solid var(--olive-border)}
.media-caption{font-size:12px;color:var(--muted);line-height:1.45}
.mixed-list{display:flex;flex-direction:column;gap:12px}.mixed-item{border-top:1px solid var(--line);padding-top:12px}.mixed-item b{display:block;font-family:var(--font-serif);font-size:20px;margin-bottom:5px}.mixed-item p{font-size:13px;color:var(--muted);line-height:1.45}
.code-panel{border:1px solid var(--line);border-radius:var(--radius-lg);background:#1f1e1b;color:#f2eee5;overflow:hidden;box-shadow:var(--shadow-sm);min-width:0}
.code-head{height:36px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:7px;padding:0 13px;color:#cfc8ba;font-family:var(--font-mono);font-size:11px}.dot{width:9px;height:9px;border-radius:99px;background:#d87757}.dot:nth-child(2){background:#d6b35c}.dot:nth-child(3){background:#8ca36f}
pre{margin:0;padding:16px 18px;font-family:var(--font-mono);font-size:clamp(11px,1.05vw,13px);line-height:1.55;white-space:pre-wrap;overflow:hidden}.kw{color:#e8b49e}.fn{color:#b8c9a3}.str{color:#e7c777}.cm{color:#8f887c}
.code-callouts{display:flex;flex-direction:column;gap:12px}.callout{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-lg);padding:13px}.callout b{font-family:var(--font-serif);font-size:18px}.callout p{font-size:13px;color:var(--muted);line-height:1.45;margin-top:5px}
.logic-map{display:grid;grid-template-columns:1fr 42px 1fr 42px 1fr;gap:16px;align-items:center;flex:1;margin-top:16px}
.logic-col{display:flex;flex-direction:column;gap:12px}.logic-node{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-lg);padding:13px;min-height:68px}.logic-node.primary{background:var(--clay-soft);border-color:var(--clay-border)}.logic-node.success{background:var(--olive-soft);border-color:var(--olive-border)}.logic-node b{font-family:var(--font-serif);font-size:19px}.logic-node p{font-size:12px;color:var(--muted);line-height:1.4;margin-top:5px}.logic-arrow{height:2px;background:var(--line-strong);position:relative}.logic-arrow:after{content:"";position:absolute;right:-1px;top:-4px;border-left:8px solid var(--line-strong);border-top:5px solid transparent;border-bottom:5px solid transparent}.logic-arrows{display:grid;gap:46px}
.chart-layout{display:grid;grid-template-columns:1.25fr .75fr;gap:18px;align-items:stretch;flex:1;margin-top:14px;min-height:0}.chart-card{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper-warm);padding:14px;min-height:0}.line-chart{width:100%;height:100%}.chart-side{display:grid;gap:10px}.mini-stat{border:1px solid var(--line);background:var(--paper);border-radius:var(--radius-lg);padding:12px}.mini-stat b{font-family:var(--font-serif);font-size:28px}.mini-stat span{display:block;font-size:12px;color:var(--muted);margin-top:4px}
.report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.report-card{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper-warm);padding:12px}.report-card b{font-family:var(--font-serif);font-size:25px}.report-card span{display:block;font-size:11px;color:var(--muted);margin-top:4px}.report-body{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;margin-top:14px}.report-panel{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper);padding:13px}.report-panel h3{font-family:var(--font-serif);font-size:18px;margin-bottom:8px}.report-panel ul{padding-left:18px;color:var(--muted);font-size:13px;line-height:1.55}
.data-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:14px;border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;font-size:13px}.data-table th{background:var(--paper-warm);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}.data-table td{padding:10px 12px;border-bottom:1px solid var(--line-faint)}.data-table tr:last-child td{border-bottom:0}.status-chip{display:inline-flex;border-radius:99px;padding:3px 8px;font-size:11px;border:1px solid var(--line);background:var(--paper-warm);color:var(--muted)}.status-chip.good{background:var(--olive-soft);border-color:var(--olive-border);color:var(--olive-dark)}.status-chip.warn{background:var(--amber-soft);border-color:#dfc48a;color:var(--amber)}
.slide.enter-forward{animation:slideForward var(--dur-slow) var(--ease-out) both}.slide.enter-back{animation:slideBack var(--dur-slow) var(--ease-out) both}.slide.enter-soft{animation:slideSoft 420ms var(--ease-out) both}
.slide.active .eyebrow,.slide.active .h1,.slide.active .h2,.slide.active .lead{animation:contentLift 520ms var(--ease-out) both}.slide.active .h1,.slide.active .h2{animation-delay:60ms}.slide.active .lead{animation-delay:120ms}
.slide.active .pill,.slide.active .point,.slide.active .metric,.slide.active .logic-node,.slide.active .mini-stat,.slide.active .report-card,.slide.active .report-panel,.slide.active .mixed-item,.slide.active .callout,.slide.active .milestone{animation:itemRise 500ms var(--ease-out) both}
.slide.active .pill:nth-child(1),.slide.active .point:nth-child(1),.slide.active .metric:nth-child(1),.slide.active .logic-node:nth-child(1),.slide.active .mini-stat:nth-child(1),.slide.active .report-card:nth-child(1),.slide.active .mixed-item:nth-child(1),.slide.active .callout:nth-child(1),.slide.active .milestone:nth-child(1){animation-delay:150ms}
.slide.active .pill:nth-child(2),.slide.active .point:nth-child(2),.slide.active .metric:nth-child(2),.slide.active .logic-node:nth-child(2),.slide.active .mini-stat:nth-child(2),.slide.active .report-card:nth-child(2),.slide.active .mixed-item:nth-child(2),.slide.active .callout:nth-child(2),.slide.active .milestone:nth-child(2){animation-delay:210ms}
.slide.active .pill:nth-child(3),.slide.active .point:nth-child(3),.slide.active .metric:nth-child(3),.slide.active .mini-stat:nth-child(3),.slide.active .report-card:nth-child(3),.slide.active .mixed-item:nth-child(3),.slide.active .callout:nth-child(3),.slide.active .milestone:nth-child(3){animation-delay:270ms}
.slide.active .pill:nth-child(4),.slide.active .point:nth-child(4),.slide.active .report-card:nth-child(4),.slide.active .milestone:nth-child(4){animation-delay:330ms}
.slide.active .bar{transform-origin:bottom;animation:barGrow 720ms var(--ease-out) both}.slide.active .bar:nth-child(2){animation-delay:80ms}.slide.active .bar:nth-child(3){animation-delay:140ms}.slide.active .bar:nth-child(4){animation-delay:200ms}
.slide.active .logic-arrow{transform-origin:left;animation:arrowDraw 620ms var(--ease-out) both;animation-delay:260ms}.slide.active .logic-arrows:nth-of-type(4) .logic-arrow{animation-delay:380ms}
.slide.active .line-chart path{stroke-dasharray:900;stroke-dashoffset:900;animation:lineDraw 900ms var(--ease-out) forwards}.slide.active .line-chart path:nth-of-type(2){animation-delay:140ms}.slide.active .line-chart circle{opacity:0;transform-box:fill-box;transform-origin:center;animation:dotPop 420ms var(--ease-out) forwards;animation-delay:760ms}
.slide.active .code-panel,.slide.active .media-frame,.slide.active .quote{animation:itemRise 560ms var(--ease-out) both;animation-delay:150ms}.slide.active .data-table tr{animation:rowReveal 460ms var(--ease-out) both}.slide.active .data-table tbody tr:nth-child(1){animation-delay:180ms}.slide.active .data-table tbody tr:nth-child(2){animation-delay:230ms}.slide.active .data-table tbody tr:nth-child(3){animation-delay:280ms}.slide.active .data-table tbody tr:nth-child(4){animation-delay:330ms}
@keyframes slideForward{from{opacity:0;transform:translateX(38px) scale(.985)}to{opacity:1;transform:translateX(0) scale(1)}}@keyframes slideBack{from{opacity:0;transform:translateX(-38px) scale(.985)}to{opacity:1;transform:translateX(0) scale(1)}}@keyframes slideSoft{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes contentLift{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes itemRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes barGrow{from{transform:scaleY(.05);opacity:.55}to{transform:scaleY(1);opacity:1}}@keyframes arrowDraw{from{transform:scaleX(0);opacity:.3}to{transform:scaleX(1);opacity:1}}@keyframes lineDraw{to{stroke-dashoffset:0}}@keyframes dotPop{from{opacity:0;transform:scale(.35)}to{opacity:1;transform:scale(1)}}@keyframes rowReveal{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.note-title{font-family:var(--font-serif);font-size:19px;font-weight:700}.note-body{font-size:14px;color:var(--muted);line-height:1.65;white-space:pre-line}
.component-card{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper);padding:14px}.component-card h3{font-size:13px;margin-bottom:8px}.component-list{font-size:12px;color:var(--muted);line-height:1.7;padding-left:18px}

  .app{grid-template-columns:220px minmax(0,1fr)}.notes{display:none}
  .slide{padding:32px 38px}.bars{height:120px}.lead{line-height:1.45}
}

  html,body{overflow:auto}.app{height:auto;min-height:100vh;display:block;overflow:visible}.rail{border-width:0 0 1px 0;max-height:none}.notes{display:none}.stage-wrap{overflow:visible}.topbar{position:sticky;top:0;z-index:5}.thumbs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));overflow:visible}.stage{overflow:visible;padding:14px}.slide{width:100%;height:auto;min-height:auto;aspect-ratio:auto;padding:26px 22px 58px}.content-grid,.metric-grid,.timeline,.media-layout,.code-layout,.logic-map,.chart-layout,.report-body,.report-grid{grid-template-columns:1fr}.logic-arrows{display:none}.bars{height:150px}.chart-card{height:230px}.quote{font-size:30px}.slide:after{left:22px;right:22px}.media-window{min-height:180px}.data-table{font-size:12px}.data-table th,.data-table td{padding:8px}

<body>
<div class="app">
  <aside class="rail">
    <div class="brand">Pager<span>Craft</span></div>
    <div class="sub" data-t="deck_sub">PPT / HTML deck example with paper-style slide components.</div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <div class="thumbs" id="thumbs"></div>
  </aside>
  <section class="stage-wrap">
    <header class="topbar">
      <div><strong id="top-title"></strong> <span class="count" id="top-count"></span></div>
      <div class="toolbar">
        <button class="btn" onclick="prevSlide()" data-t="prev">上一页</button>
        <button class="btn primary" onclick="nextSlide()" data-t="next">下一页</button>
        <button class="btn" onclick="toggleFullscreen()" data-t="full">演示</button>
      </div>
    </header>
    <div class="progress"><div class="progress-fill" id="progress"></div></div>
    <main class="stage" id="stage"></main>
  </section>
  <aside class="notes">
    <div class="component-card">
      <div class="note-title" data-t="speaker_notes">演讲备注</div>
      <div class="note-body" id="note-body"></div>
    </div>
    <div class="component-card">
      <h3 data-t="ppt_components">PPT 组件</h3>
      <ul class="component-list">
        <li data-t="comp_1">标题页 / 章节页</li>
        <li data-t="comp_2">双栏内容页</li>
        <li data-t="comp_3">指标卡 + 图表页</li>
        <li data-t="comp_4">逻辑关系图页</li>
        <li data-t="comp_5">趋势图表页</li>
        <li data-t="comp_6">报表摘要页</li>
        <li data-t="comp_7">数据表格页</li>
        <li data-t="comp_8">图文混排页</li>
        <li data-t="comp_9">代码展示页</li>
        <li data-t="comp_10">引用页 / 结论页</li>
        <li data-t="comp_11">时间线 / 路线图页</li>
      </ul>
    </div>
    <div class="footer-controls">
      <button class="btn" onclick="prevSlide()" data-t="prev_short">上页</button>
      <button class="btn primary" onclick="nextSlide()" data-t="next_short">下页</button>
    </div>
  </aside>
</div>
<script>
const CODE_ZH=`const slide = createSlide({
  type: "mixed-media",
  title: "图文关系先于装饰",
  layout: ["visual", "claim", "evidence"],
});

deck.add(slide).validate({
  viewport: ["desktop", "mobile"],
  overflow: false,
});`;
const CODE_EN=`const slide = createSlide({
  type: "mixed-media",
  title: "Image and text before decoration",
  layout: ["visual", "claim", "evidence"],
});

let LANG='zh', index=0, NAV_DIR=0, HAS_RENDERED=false;
function t(k){return COPY[LANG][k]||k}
function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function highlightCode(str){
 return escapeHtml(str)
  .replace(/\b(const|type|title|layout|viewport|overflow|false)\b/g,'<span class="kw">$1</span>')
  .replace(/\b(createSlide|validate|add)\b/g,'<span class="fn">$1</span>')
  .replace(/(&quot;.*?&quot;)/g,'<span class="str">$1</span>');
}
function render(){
 const slides=COPY[LANG].slides;
 document.querySelectorAll('[data-t]').forEach(el=>el.textContent=t(el.dataset.t));
 document.getElementById('thumbs').innerHTML=slides.map((s,i)=>`<button class="thumb ${i===index?'active':''}" onclick="go(${i})"><div class="thumb-no">${String(i+1).padStart(2,'0')} · ${s.k}</div><div class="thumb-title">${s.title||s.quote}</div></button>`).join('');
 document.getElementById('stage').innerHTML=slides.map((s,i)=>slideHtml(s,i)).join('');
 const active=document.querySelectorAll('.slide')[index];
 active.classList.add('active',HAS_RENDERED?(NAV_DIR<0?'enter-back':'enter-forward'):'enter-soft');
 document.getElementById('top-title').textContent=slides[index].k;
 document.getElementById('top-count').textContent=`${index+1}/${slides.length}`;
 document.getElementById('progress').style.width=((index+1)/slides.length*100)+'%';
 document.getElementById('note-body').textContent=slides[index].note;
 document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG));
 HAS_RENDERED=true;
 requestAnimationFrame(fitSlides);
}
function slideHtml(s){
 if(s.type==='title')return `<article class="slide title-slide"><div class="eyebrow">${s.k}</div><h1 class="h1">${s.title}</h1><p class="lead">${s.lead}</p><div class="meta-row">${s.meta.map(m=>`<span class="pill">${m}</span>`).join('')}</div></article>`;
 if(s.type==='two')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="content-grid">${s.points.map(p=>`<div class="point"><b>${p[0]}</b><p>${p[1]}</p></div>`).join('')}</div></article>`;
 if(s.type==='data')return `<article class="slide data-slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="metric-grid">${s.metrics.map(m=>`<div class="metric"><div class="metric-value">${m[0]}</div><div class="metric-label">${m[1]}</div></div>`).join('')}</div><div class="bars">${s.bars.map((b,i)=>`<div class="bar ${i%2?'secondary':''}" style="height:${b}%"><span>Q${i+1}</span></div>`).join('')}</div></article>`;
 if(s.type==='logic')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="logic-map">${s.cols.map((col,ci)=>`<div class="logic-col">${col.map(n=>`<div class="logic-node ${n[2]||''}"><b>${n[0]}</b><p>${n[1]}</p></div>`).join('')}</div>${ci<s.cols.length-1?'<div class="logic-arrows"><div class="logic-arrow"></div><div class="logic-arrow"></div></div>':''}`).join('')}</div></article>`;
 if(s.type==='chart')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="chart-layout"><div class="chart-card"><svg class="line-chart" viewBox="0 0 520 250" preserveAspectRatio="none"><g stroke="var(--line)" stroke-width="1">${[50,100,150,200].map(y=>`<line x1="28" y1="${y}" x2="500" y2="${y}"/>`).join('')}</g><path d="M30 190 C90 160 120 172 170 132 S260 94 315 118 410 65 492 78" fill="none" stroke="var(--clay)" stroke-width="6" stroke-linecap="round"/><path d="M30 210 C100 188 145 196 205 168 S302 145 358 156 430 118 492 124" fill="none" stroke="var(--olive)" stroke-width="4" stroke-linecap="round"/><g fill="var(--paper)" stroke="var(--clay)" stroke-width="4"><circle cx="170" cy="132" r="7"/><circle cx="315" cy="118" r="7"/><circle cx="492" cy="78" r="7"/></g><g fill="var(--muted)" font-size="18" font-family="system-ui"><text x="28" y="235">Q1</text><text x="182" y="235">Q2</text><text x="336" y="235">Q3</text><text x="472" y="235">Q4</text></g></svg></div><div class="chart-side">${s.stats.map(st=>`<div class="mini-stat"><b>${st[0]}</b><span>${st[1]}</span></div>`).join('')}</div></div></article>`;
 if(s.type==='report')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="report-grid">${s.cards.map(c=>`<div class="report-card"><b>${c[0]}</b><span>${c[1]}</span></div>`).join('')}</div><div class="report-body"><div class="report-panel"><h3>${LANG==='zh'?'关键洞察':'Key insights'}</h3><ul>${s.left.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="report-panel"><h3>${LANG==='zh'?'风险提示':'Risks'}</h3><ul>${s.right.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></article>`;
 if(s.type==='table')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><table class="data-table"><thead><tr>${s.columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${s.rows.map(r=>`<tr>${r.map((c,i)=>i===2?`<td><span class="status-chip ${/健康|Healthy/.test(c)?'good':/风险|Risk/.test(c)?'warn':''}">${c}</span></td>`:`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></article>`;
 if(s.type==='image')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="media-layout"><div class="media-frame"><div class="media-window"></div><p class="media-caption">${s.caption}</p></div><div class="mixed-list">${s.items.map(p=>`<div class="mixed-item"><b>${p[0]}</b><p>${p[1]}</p></div>`).join('')}</div></div></article>`;
 if(s.type==='code')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="code-layout"><div class="code-panel"><div class="code-head"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span>${s.codeTitle}</span></div><pre>${highlightCode(s.code)}</pre></div><div class="code-callouts">${s.callouts.map(p=>`<div class="callout"><b>${p[0]}</b><p>${p[1]}</p></div>`).join('')}</div></div></article>`;
 if(s.type==='quote')return `<article class="slide"><div class="quote"><div class="quote-mark">“</div>${s.quote}<div class="quote-by">${s.by}</div></div></article>`;
 return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="timeline">${s.steps.map(p=>`<div class="milestone"><strong>${p[0]}</strong><p>${p[1]}</p></div>`).join('')}</div></article>`;
}
function setLang(l){LANG=l;NAV_DIR=0;render()}
function go(i){NAV_DIR=i<index?-1:i>index?1:0;index=i;render()}
function nextSlide(){if(index>=COPY[LANG].slides.length-1)return;NAV_DIR=1;index+=1;render()}
function prevSlide(){if(index<=0)return;NAV_DIR=-1;index-=1;render()}
function fitSlides(){
 if (window.matchMedia('(max-width:760px)').matches) {
  document.documentElement.style.removeProperty('--slide-w');
  document.documentElement.style.removeProperty('--slide-h');
  return;
 }
 const stage=document.querySelector('.stage');
 if(!stage) return;
 const rect=stage.getBoundingClientRect();
 const maxFrame=document.body.classList.contains('fullscreen') ? 1280 : 1060;
 const w=Math.max(320, Math.min(rect.width, maxFrame, rect.height * 16 / 9));
 const h=w * 9 / 16;
 document.documentElement.style.setProperty('--slide-w', Math.floor(w)+'px');
 document.documentElement.style.setProperty('--slide-h', Math.floor(h)+'px');
}
function toggleFullscreen(){document.body.classList.toggle('fullscreen');requestAnimationFrame(fitSlides)}
window.addEventListener('resize',fitSlides);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')nextSlide();if(e.key==='ArrowLeft')prevSlide();if(e.key==='Escape'){document.body.classList.remove('fullscreen');requestAnimationFrame(fitSlides)}});
render();
</script>
