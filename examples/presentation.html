<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PagerCraft — Presentation Example</title>
<style>
:root{
  --ivory:#FAF9F5;--paper:#FFFFFF;--paper-warm:#F7F4EC;--paper-deep:#F3EEE4;
  --ink:#171716;--muted:#706F68;--faint:#A09E96;--line:#D8D1C3;--line-strong:#C8BBA8;--line-faint:#EAE5DA;
  --clay:#C86645;--clay-dark:#A84D32;--clay-soft:#FBEDE6;--clay-border:#E8B49E;
  --olive:#74845B;--olive-dark:#56663E;--olive-soft:#EDF1E7;--olive-border:#B8C9A3;
  --amber:#B87A1A;--amber-soft:#FBF1DF;--blue:#2D6BB0;--blue-soft:#E8F0FB;
  --font-serif:ui-serif,Georgia,"Times New Roman",serif;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --radius-sm:6px;--radius-md:8px;--radius-lg:10px;--shadow-sm:0 2px 6px rgba(23,23,22,.08);--shadow-md:0 6px 24px rgba(23,23,22,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--ivory);color:var(--ink);font-family:var(--font-sans);font-size:15px}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}
.app{height:100vh;display:grid;grid-template-columns:clamp(200px,18vw,250px) minmax(0,1fr) clamp(220px,20vw,280px);overflow:hidden}
.rail,.notes{min-height:0;background:rgba(255,255,255,.68);border-color:var(--line);border-style:solid}
.rail{border-width:0 1px 0 0;padding:18px;overflow:auto}
.notes{border-width:0 0 0 1px;padding:18px;display:flex;flex-direction:column;gap:14px;overflow:auto}
.brand{font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:4px}.brand span{color:var(--clay)}
.sub{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:16px}
.lang-toggle,.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lang-toggle{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-md);padding:3px;margin-bottom:16px}
.lang-btn,.btn{border:1px solid var(--line);background:var(--paper);border-radius:var(--radius-md);font-size:13px;height:32px;padding:0 10px}
.lang-btn.active,.btn.primary{background:var(--clay-soft);border-color:var(--clay-border);color:var(--clay-dark);font-weight:700}
.thumbs{display:flex;flex-direction:column;gap:9px}
.thumb{width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:10px;transition:.2s}
.thumb:hover{border-color:var(--line-strong);background:var(--paper-warm)}
.thumb.active{border-color:var(--clay-border);box-shadow:inset 3px 0 0 var(--clay)}
.thumb-no{font-family:var(--font-mono);font-size:11px;color:var(--faint);margin-bottom:5px}.thumb-title{font-size:12px;font-weight:700;line-height:1.35}
.stage-wrap{min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;flex:0 0 54px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 18px;background:rgba(250,249,245,.82);backdrop-filter:blur(10px)}
.progress{height:5px;flex:0 0 5px;background:var(--paper-deep)}.progress-fill{height:100%;background:var(--clay);width:0;transition:width .2s}
.stage{flex:1;min-height:0;display:grid;place-items:center;padding:clamp(12px,2vw,26px);overflow:hidden}
.slide{
  width:var(--slide-w,min(100%,1060px));height:var(--slide-h,auto);aspect-ratio:16/9;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-md);
  padding:clamp(30px,4.7vw,54px) clamp(34px,5.4vw,62px);display:none;overflow:hidden;position:relative;
}
.slide.active{display:flex;flex-direction:column}
.slide:after{content:"";position:absolute;left:clamp(34px,5.4vw,62px);right:clamp(34px,5.4vw,62px);bottom:24px;height:1px;background:var(--line-faint)}
.eyebrow{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--clay-dark);margin-bottom:clamp(8px,1.4vw,16px)}
.h1{font-family:var(--font-serif);font-size:clamp(34px,4.2vw,54px);line-height:1.04;letter-spacing:0;margin-bottom:clamp(10px,1.5vw,18px)}
.h2{font-family:var(--font-serif);font-size:clamp(29px,3.4vw,42px);line-height:1.08;letter-spacing:0;margin-bottom:10px}
.lead{font-size:clamp(15px,1.55vw,20px);color:var(--muted);line-height:1.5;max-width:720px}
.title-slide{justify-content:center}.title-slide .lead{max-width:780px}.meta-row{display:flex;gap:9px;margin-top:24px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--paper-warm);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--muted)}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
.point{border-top:1px solid var(--line);padding-top:13px}.point b{display:block;font-family:var(--font-serif);font-size:clamp(18px,2vw,23px);margin-bottom:6px}.point p{font-size:14px;color:var(--muted);line-height:1.45}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.metric{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-lg);padding:14px 16px}
.metric-value{font-family:var(--font-serif);font-size:clamp(31px,3.4vw,42px);line-height:1;color:var(--ink)}.metric-label{font-size:12px;color:var(--muted);margin-top:6px}
.bars{display:flex;align-items:end;gap:12px;height:clamp(108px,16vh,160px);margin-top:14px;padding:15px 16px 30px;border:1px solid var(--line);border-radius:var(--radius-lg);background:linear-gradient(var(--paper-warm),var(--paper))}
.bar{flex:1;border-radius:6px 6px 0 0;background:var(--clay);min-height:24px;position:relative}.bar.secondary{background:var(--olive)}.bar span{position:absolute;left:0;right:0;bottom:-23px;text-align:center;font-size:11px;color:var(--muted)}
.quote{margin:auto;max-width:820px;font-family:var(--font-serif);font-size:clamp(30px,3.4vw,42px);line-height:1.18}.quote-mark{font-size:64px;color:var(--clay);line-height:.8}.quote-by{font-family:var(--font-sans);font-size:14px;color:var(--muted);margin-top:20px}
.timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:28px;border-top:2px solid var(--line-strong)}
.milestone{padding:15px 12px 0;border-left:1px solid var(--line)}.milestone:first-child{border-left:0}.milestone strong{font-family:var(--font-serif);font-size:19px}.milestone p{font-size:13px;color:var(--muted);line-height:1.4;margin-top:7px}
.media-layout,.code-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:24px;align-items:stretch;margin-top:14px;min-height:0;flex:1}
.media-frame{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper-warm);padding:16px;display:flex;flex-direction:column;gap:12px;min-height:0}
.media-window{flex:1;min-height:120px;border:1px solid var(--line);border-radius:var(--radius-md);background:linear-gradient(135deg,var(--paper) 0%,var(--paper-deep) 100%);position:relative;overflow:hidden}
.media-window:before{content:"";position:absolute;left:28px;right:28px;top:32px;height:46%;border-radius:10px;background:var(--clay-soft);border:1px solid var(--clay-border)}
.media-window:after{content:"";position:absolute;left:54px;right:70px;bottom:34px;height:20%;border-radius:10px;background:var(--olive-soft);border:1px solid var(--olive-border)}
.media-caption{font-size:12px;color:var(--muted);line-height:1.45}
.mixed-list{display:flex;flex-direction:column;gap:12px}.mixed-item{border-top:1px solid var(--line);padding-top:12px}.mixed-item b{display:block;font-family:var(--font-serif);font-size:20px;margin-bottom:5px}.mixed-item p{font-size:13px;color:var(--muted);line-height:1.45}
.code-panel{border:1px solid var(--line);border-radius:var(--radius-lg);background:#1f1e1b;color:#f2eee5;overflow:hidden;box-shadow:var(--shadow-sm);min-width:0}
.code-head{height:36px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:7px;padding:0 13px;color:#cfc8ba;font-family:var(--font-mono);font-size:11px}.dot{width:9px;height:9px;border-radius:99px;background:#d87757}.dot:nth-child(2){background:#d6b35c}.dot:nth-child(3){background:#8ca36f}
pre{margin:0;padding:16px 18px;font-family:var(--font-mono);font-size:clamp(11px,1.05vw,13px);line-height:1.55;white-space:pre-wrap;overflow:hidden}.kw{color:#e8b49e}.fn{color:#b8c9a3}.str{color:#e7c777}.cm{color:#8f887c}
.code-callouts{display:flex;flex-direction:column;gap:12px}.callout{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--radius-lg);padding:13px}.callout b{font-family:var(--font-serif);font-size:18px}.callout p{font-size:13px;color:var(--muted);line-height:1.45;margin-top:5px}
.note-title{font-family:var(--font-serif);font-size:19px;font-weight:700}.note-body{font-size:14px;color:var(--muted);line-height:1.65;white-space:pre-line}
.component-card{border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--paper);padding:14px}.component-card h3{font-size:13px;margin-bottom:8px}.component-list{font-size:12px;color:var(--muted);line-height:1.7;padding-left:18px}
.footer-controls{display:flex;gap:8px;margin-top:auto}.count{font-family:var(--font-mono);font-size:12px;color:var(--muted);white-space:nowrap}
.fullscreen .app{grid-template-columns:1fr}.fullscreen .rail,.fullscreen .notes,.fullscreen .topbar{display:none}.fullscreen .stage{min-height:100vh}.fullscreen .slide{width:var(--slide-w,min(96vw,1280px))}
@media(max-width:1320px){
  .app{grid-template-columns:220px minmax(0,1fr)}.notes{display:none}
  .slide{padding:32px 38px}.bars{height:120px}.lead{line-height:1.45}
}
@media(max-width:760px){
  html,body{overflow:auto}.app{height:auto;min-height:100vh;display:block;overflow:visible}.rail{border-width:0 0 1px 0;max-height:none}.notes{display:none}.stage-wrap{overflow:visible}.topbar{position:sticky;top:0;z-index:5}.thumbs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));overflow:visible}.stage{overflow:visible;padding:14px}.slide{width:100%;height:auto;min-height:auto;aspect-ratio:auto;padding:26px 22px 58px}.content-grid,.metric-grid,.timeline,.media-layout,.code-layout{grid-template-columns:1fr}.bars{height:150px}.quote{font-size:30px}.slide:after{left:22px;right:22px}.media-window{min-height:180px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand">Pager<span>Craft</span></div>
    <div class="sub" data-t="deck_sub">PPT / HTML deck example with paper-style slide components.</div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <div class="thumbs" id="thumbs"></div>
  </aside>
  <section class="stage-wrap">
    <header class="topbar">
      <div><strong id="top-title"></strong> <span class="count" id="top-count"></span></div>
      <div class="toolbar">
        <button class="btn" onclick="prevSlide()" data-t="prev">上一页</button>
        <button class="btn primary" onclick="nextSlide()" data-t="next">下一页</button>
        <button class="btn" onclick="toggleFullscreen()" data-t="full">演示</button>
      </div>
    </header>
    <div class="progress"><div class="progress-fill" id="progress"></div></div>
    <main class="stage" id="stage"></main>
  </section>
  <aside class="notes">
    <div class="component-card">
      <div class="note-title" data-t="speaker_notes">演讲备注</div>
      <div class="note-body" id="note-body"></div>
    </div>
    <div class="component-card">
      <h3 data-t="ppt_components">PPT 组件</h3>
      <ul class="component-list">
        <li data-t="comp_1">标题页 / 章节页</li>
        <li data-t="comp_2">双栏内容页</li>
        <li data-t="comp_3">指标卡 + 图表页</li>
        <li data-t="comp_4">图文混排页</li>
        <li data-t="comp_5">代码展示页</li>
        <li data-t="comp_6">引用页 / 结论页</li>
        <li data-t="comp_7">时间线 / 路线图页</li>
      </ul>
    </div>
    <div class="footer-controls">
      <button class="btn" onclick="prevSlide()" data-t="prev_short">上页</button>
      <button class="btn primary" onclick="nextSlide()" data-t="next_short">下页</button>
    </div>
  </aside>
</div>

let LANG='zh', index=0;
function t(k){return COPY[LANG][k]||k}
function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function highlightCode(str){
 return escapeHtml(str)
  .replace(/\b(const|type|title|layout|viewport|overflow|false)\b/g,'<span class="kw">$1</span>')
  .replace(/\b(createSlide|validate|add)\b/g,'<span class="fn">$1</span>')
  .replace(/(&quot;.*?&quot;)/g,'<span class="str">$1</span>');
}
function render(){
 const slides=COPY[LANG].slides;
 document.querySelectorAll('[data-t]').forEach(el=>el.textContent=t(el.dataset.t));
 document.getElementById('thumbs').innerHTML=slides.map((s,i)=>`<button class="thumb ${i===index?'active':''}" onclick="go(${i})"><div class="thumb-no">${String(i+1).padStart(2,'0')} · ${s.k}</div><div class="thumb-title">${s.title||s.quote}</div></button>`).join('');
 document.getElementById('stage').innerHTML=slides.map((s,i)=>slideHtml(s,i)).join('');
 document.querySelectorAll('.slide')[index].classList.add('active');
 document.getElementById('top-title').textContent=slides[index].k;
 document.getElementById('top-count').textContent=`${index+1}/${slides.length}`;
 document.getElementById('progress').style.width=((index+1)/slides.length*100)+'%';
 document.getElementById('note-body').textContent=slides[index].note;
 document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG));
 requestAnimationFrame(fitSlides);
}
function slideHtml(s){
 if(s.type==='title')return `<article class="slide title-slide"><div class="eyebrow">${s.k}</div><h1 class="h1">${s.title}</h1><p class="lead">${s.lead}</p><div class="meta-row">${s.meta.map(m=>`<span class="pill">${m}</span>`).join('')}</div></article>`;
 if(s.type==='two')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="content-grid">${s.points.map(p=>`<div class="point"><b>${p[0]}</b><p>${p[1]}</p></div>`).join('')}</div></article>`;
 if(s.type==='data')return `<article class="slide data-slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="metric-grid">${s.metrics.map(m=>`<div class="metric"><div class="metric-value">${m[0]}</div><div class="metric-label">${m[1]}</div></div>`).join('')}</div><div class="bars">${s.bars.map((b,i)=>`<div class="bar ${i%2?'secondary':''}" style="height:${b}%"><span>Q${i+1}</span></div>`).join('')}</div></article>`;
 if(s.type==='image')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="media-layout"><div class="media-frame"><div class="media-window"></div><p class="media-caption">${s.caption}</p></div><div class="mixed-list">${s.items.map(p=>`<div class="mixed-item"><b>${p[0]}</b><p>${p[1]}</p></div>`).join('')}</div></div></article>`;
 if(s.type==='code')return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="code-layout"><div class="code-panel"><div class="code-head"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span>${s.codeTitle}</span></div><pre>${highlightCode(s.code)}</pre></div><div class="code-callouts">${s.callouts.map(p=>`<div class="callout"><b>${p[0]}</b><p>${p[1]}</p></div>`).join('')}</div></div></article>`;
 if(s.type==='quote')return `<article class="slide"><div class="quote"><div class="quote-mark">“</div>${s.quote}<div class="quote-by">${s.by}</div></div></article>`;
 return `<article class="slide"><div class="eyebrow">${s.k}</div><h2 class="h2">${s.title}</h2><p class="lead">${s.lead}</p><div class="timeline">${s.steps.map(p=>`<div class="milestone"><strong>${p[0]}</strong><p>${p[1]}</p></div>`).join('')}</div></article>`;
}
function setLang(l){LANG=l;render()}
function go(i){index=i;render()}
function nextSlide(){index=Math.min(COPY[LANG].slides.length-1,index+1);render()}
function prevSlide(){index=Math.max(0,index-1);render()}
function fitSlides(){
 if (window.matchMedia('(max-width:760px)').matches) {
  document.documentElement.style.removeProperty('--slide-w');
  document.documentElement.style.removeProperty('--slide-h');
  return;
 }
 const stage=document.querySelector('.stage');
 if(!stage) return;
 const rect=stage.getBoundingClientRect();
 const maxFrame=document.body.classList.contains('fullscreen') ? 1280 : 1060;
 const w=Math.max(320, Math.min(rect.width, maxFrame, rect.height * 16 / 9));
 const h=w * 9 / 16;
 document.documentElement.style.setProperty('--slide-w', Math.floor(w)+'px');
 document.documentElement.style.setProperty('--slide-h', Math.floor(h)+'px');
}
function toggleFullscreen(){document.body.classList.toggle('fullscreen');requestAnimationFrame(fitSlides)}
window.addEventListener('resize',fitSlides);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')nextSlide();if(e.key==='ArrowLeft')prevSlide();if(e.key==='Escape'){document.body.classList.remove('fullscreen');requestAnimationFrame(fitSlides)}});
render();
</script>
</body>
</html>
